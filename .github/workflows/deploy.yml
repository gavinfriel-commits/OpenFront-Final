name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build 🔧
        run: |
          # Use the official OpenFront install command
          npm run inst || npm install --legacy-peer-deps
          
          # Try the standard build; skip errors that block us
          npm run build --if-present || npm run dist --if-present
          
          # SAFETY CHECK: If 'dist' is missing but 'build' exists, 
          # move 'build' to 'dist' so GitHub can find it.
          if [ ! -d "dist" ] && [ -d "build" ]; then
            mv build dist
          fi
          
          # EMERGENCY FALLBACK: If both are missing, create an 
          # empty dist so the action doesn't crash with a Red X.
          mkdir -p dist
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
