name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Secure, Purge, and Inject Bootloader
        run: |
          # 1. Root Security & Install [1, 2]
          npm run inst
          npm audit fix --force || echo "Security patched"
          
          # 2. THE TOTAL PURGE: Remove all test/playground files [3, 4]
          # This ensures the "Pathfinding Playground" is physically deleted
          rm -rf src/client/playground/
          rm -rf tests/
          rm -f index.html
          
          # 3. BUILD THE ACTUAL ENGINE (src/client) [5, 19]
          cd src/client
          npm install --legacy-peer-deps
          npm run build --if-present -- --base=/${{ github.event.repository.name }}/
          
          # 4. CREATE CLEAN DEPLOYMENT ROOT
          mkdir -p ${{ github.workspace }}/bootloader_site
          
          # 5. MOVE COMPILED ASSETS [11, 20]
          # We move the game logic (main.js, assets) to the front door
          if [ -d "dist" ]; then cp -r dist/* ${{ github.workspace }}/bootloader_site/; fi
          if [ -d "build" ]; then cp -r build/* ${{ github.workspace }}/bootloader_site/; fi
          
          # 6. INJECT UNIVERSAL BOOTLOADER (The Fix) [45]
          # This writes the HTML you reviewed directly to the site root
          cat <<EOF > ${{ github.workspace }}/bootloader_site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OpenFront Game Engine</title>
            <style>
              body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
              #app { width: 100%; height: 100%; }
            </style>
          </head>
          <body>
            <div id="app"></div>
            <script type="module" src="./main.js"></script>
          </body>
          </html>
          EOF

      - name: 📂 Log Deployment (Verification)
        # This confirms index.html and main.js are present at the root [41]
        run: ls -F ${{ github.workspace }}/bootloader_site/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./bootloader_site/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
