name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Actual Game Engine 🔧
        run: |
          # 1. Official OpenFront install at root
          npm run inst
          
          # 2. FIND THE GAME ENGINE: Check for src/client or client
          if [ -d "src/client" ]; then
            WORKING_DIR="src/client"
          elif [ -d "client" ]; then
            WORKING_DIR="client"
          else
            echo "Error: Main game folder not found!"
            exit 1
          fi
          
          # 3. Enter the game folder and install its specific tools
          cd $WORKING_DIR
          npm install --legacy-peer-deps
          
          # 4. BUILD THE GAME: Setting the base flag for GitHub Pages [26]
          npm run build -- --base=/${{ github.event.repository.name }}/ || npm run compile -- --base=/${{ github.event.repository.name }}/
          
          # 5. FIX THE 404: Flatten the result into a root-level deployment folder
          mkdir -p ${{ github.workspace }}/final_site
          cp -r dist/* ${{ github.workspace }}/final_site/ || cp -r build/* ${{ github.workspace }}/final_site/ || cp index.html ${{ github.workspace }}/final_site/
          
      - name: 📂 Log Artifact (404 Prevention Check)
        # This confirms index.html is at the ABSOLUTE ROOT of the deployment
        run: ls -F ${{ github.workspace }}/final_site/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to the flat folder where index.html is at the top level
          path: ./final_site/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
