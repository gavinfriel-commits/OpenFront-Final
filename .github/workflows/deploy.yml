name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Install, Audit, and Force-Flatten HTML
        run: |
          # 1. Run your official install and security fix [1]
          npm run inst
          npm audit fix --force || echo "Audit complete"
          
          # 2. Enter and Build the Actual Game (Ignoring Tests) [2]
          # This ensures we build the main engine, not the pathfinding test
          cd src/client
          npm install --legacy-peer-deps
          npm run build --if-present -- --base=/${{ github.event.repository.name }}/ || \
          npm run compile --if-present -- --base=/${{ github.event.repository.name }}/
          
          # 3. CREATE THE FRONT DOOR
          # We create a clean folder that will be the 'root' of your website
          mkdir -p ${{ github.workspace }}/deploy_root
          
          # 4. MOVE THE HTML TO THE ROOT (404 Prevention)
          # We take everything inside 'dist' or 'build' and move it to the top level [5]
          if [ -d "dist" ]; then 
            cp -r dist/* ${{ github.workspace }}/deploy_root/
          elif [ -d "build" ]; then 
            cp -r build/* ${{ github.workspace }}/deploy_root/
          else
            # Fallback: Copy the raw client files if no build folder exists
            cp -r ./* ${{ github.workspace }}/deploy_root/
          fi
          
          # 5. VERIFY: The Search & Rescue command
          # If index.html is still missing from the root, we find it and force it there [1, 5]
          if [ ! -f "${{ github.workspace }}/deploy_root/index.html" ]; then
            echo "Searching for misplaced index.html..."
            find . -name "index.html" -exec cp {} ${{ github.workspace }}/deploy_root/ \;
          fi

      - name: 📂 Log Deployment (Verification)
        # This PROVES index.html is at the ROOT of the artifact
        run: ls -F ${{ github.workspace }}/deploy_root/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to the folder where index.html is now at the absolute top [5]
          path: ./deploy_root/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
