name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build 🔧
        run: |
          npm install --legacy-peer-deps
          # Run the main game build command
          npm run build --if-present
          
          # This command creates the folder GitHub expects
          mkdir -p dist
          
          # SEARCH & RESCUE: If the build created a 'build' folder, move it to 'dist'
          if [ -d "build" ]; then cp -r build/* dist/; fi
          
          # If no folder was created, it moves the root files (index.html) into dist
          if [ -f "index.html" ]; then cp index.html dist/; fi
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # This must point to 'dist' so GitHub can find the game
          path: ./dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
