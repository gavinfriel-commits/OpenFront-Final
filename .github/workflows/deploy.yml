name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # FIX: The standard action name is actions/checkout
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Install, Audit, and Flatten OpenFront
        run: |
          # 1. Official OpenFront install and security fix
          npm run inst
          npm audit fix --force || echo "Security warnings bypassed"
          
          # 2. Enter and Build the Main Game Engine (Ignoring Tests)
          cd src/client
          npm install --legacy-peer-deps
          npm run build -- --base=/${{ github.event.repository.name }}/
          
          # 3. Create a flattened deployment folder at the root
          mkdir -p ../../site_deployment
          
          # 4. MOVE THE HTML TO THE ROOT (404 Prevention)
          # Takes everything inside 'dist' and puts it at the TOP level
          if [ -d "dist" ]; then cp -r dist/* ../../site_deployment/; fi
          if [ -d "build" ]; then cp -r build/* ../../site_deployment/; fi
          
          # 5. Search & Rescue: Ensure index.html is at the root
          if [ ! -f "../../site_deployment/index.html" ]; then
            find . -name "index.html" -exec cp {} ../../site_deployment/ \;
          fi

      - name: 📂 Log Deployment (Verification)
        # Proves index.html is at the root so the site actually loads
        run: ls -F ${{ github.workspace }}/site_deployment/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site_deployment/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
