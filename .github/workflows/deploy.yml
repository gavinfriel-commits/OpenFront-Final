name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Secure, Purge, and Build Engine
        run: |
          # 1. ROOT SECURITY & INSTALL [1, 2]
          # This handles the vulnerabilities you saw in the log
          npm run inst
          npm audit fix --force || echo "Security patched"
          
          # 2. THE TOTAL PURGE [3, 4]
          # We delete the playground files so they cannot conflict with the game
          rm -rf src/client/playground/
          rm -rf tests/
          rm -f index.html
          
          # 3. ENTER ENGINE FOLDER & BUILD (Fixes "Missing Script" error) [3, 5]
          # We must move into src/client to find the correct 'build' command
          cd src/client
          npm install --legacy-peer-deps
          npm run build -- --base=/${{ github.event.repository.name }}/
          
          # 4. CREATE DEPLOYMENT ROOT AT WORKSPACE LEVEL
          mkdir -p ${{ github.workspace }}/final_site
          
          # 5. MOVE COMPILED ASSETS TO THE FRONT DOOR [11, 20]
          # We copy the game code from src/client/dist to the deployment root
          if [ -d "dist" ]; then 
            cp -r dist/* ${{ github.workspace }}/final_site/
          elif [ -d "build" ]; then
            cp -r build/* ${{ github.workspace }}/final_site/
          fi
          
          # 6. SMART LINKER: Find the JS file for the Bootloader [6, 40]
          # We search the deployment folder for the main engine file
          REAL_JS=$(find ${{ github.workspace }}/final_site -name "*.js" | head -n 1 | xargs basename)
          echo "Detected Engine Entry: $REAL_JS"
          
          # 7. INJECT UPDATED BOOTLOADER (404 Prevention) [45]
          cat <<EOF > ${{ github.workspace }}/final_site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OpenFront Game Engine</title>
            <style>
              body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
              #app { width: 100%; height: 100%; }
            </style>
          </head>
          <body>
            <div id="app"></div>
            <script type="module" src="./$REAL_JS"></script>
          </body>
          </html>
          EOF

      - name: 📂 Log Deployment (Final Verification)
        # Confirms the files and the detected JS name
        run: ls -R ${{ github.workspace }}/final_site/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_site/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
