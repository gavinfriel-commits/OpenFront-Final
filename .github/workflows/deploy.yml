name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build 🔧
        run: |
          # 1. Install root dependencies using OpenFront's official command
          npm run inst
          
          # 2. Enter the game engine folder (src/client or client)
          if [ -d "src/client" ]; then
            cd src/client
          elif [ -d "client" ]; then
            cd client
          else
            echo "Error: Main game folder not found!"
            exit 1
          fi
          
          # 3. Install tools needed for the actual game
          npm install --legacy-peer-deps
          
          # 4. Build the actual game engine (NOT the pathfinding test)
          # We try 'build' then 'compile'. The --base flag fixes the white screen.
          npm run build -- --base=/${{ github.event.repository.name }}/ || npm run compile -- --base=/${{ github.event.repository.name }}/ || echo "Standard build failed, trying fallback"
          
          # 5. Move the finished game files to the root 'dist' folder for deployment
          mkdir -p ../../dist
          cp -r dist/* ../../dist/ || cp -r build/* ../../dist/ || cp index.html ../../dist/ || echo "No files found to deploy"
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # Pointing to the root 'dist' where we moved the game files
          path: ./dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
