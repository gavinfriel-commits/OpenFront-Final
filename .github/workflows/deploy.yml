name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build 🔧
        run: |
          npm install --legacy-peer-deps
          # This command builds the main OpenFront game [1, 4]
          npm run build --if-present
          
          # Force create 'dist' if the build put files in 'build'
          mkdir -p dist
          if [ -d "build" ]; then cp -r build/* dist/; fi
          
          # If the build failed, move the root index.html to dist as a fallback
          if [ -f "index.html" ]; then cp index.html dist/; fi

      - name: 📂 Log Folder Contents (Verification)
        run: |
          echo "Verification: Checking for Game Files in 'dist'..."
          ls -R dist/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
