name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Install, Purge Playground, and Build Engine
        run: |
          # 1. Root Installation and Security Patching [19, 20]
          npm run inst
          npm audit fix --force || echo "Audit complete"
          
          # 2. THE PLAYGROUND PURGE (Fixes the "Wrong Game" issue)
          # We delete the tests and root index.html so they CANNOT be deployed [3, 4]
          rm -rf tests/
          rm -rf pathfinding/
          rm -f index.html
          
          # 3. ISOLATE THE ACTUAL ENGINE (src/client) [1, 11]
          # We move into the game folder where the real build scripts live
          cd src/client
          npm install --legacy-peer-deps
          
          # 4. MULTI-COMMAND BUILD (Fixes the "Missing Script" error)
          # We try every possible build command; --if-present prevents the crash [1]
          npm run build --if-present -- --base=/${{ github.event.repository.name }}/
          npm run compile --if-present -- --base=/${{ github.event.repository.name }}/
          npm run dist --if-present -- --base=/${{ github.event.repository.name }}/
          
          # 5. CREATE CLEAN DEPLOYMENT ROOT
          mkdir -p ${{ github.workspace }}/site_deployment
          
          # 6. TARGETED FLATTENING (404 Prevention) [11, 41]
          # We only take the results from the client engine build output
          if [ -d "dist" ]; then 
            cp -r dist/* ${{ github.workspace }}/site_deployment/
          elif [ -d "build" ]; then 
            cp -r build/* ${{ github.workspace }}/site_deployment/
          else
            # Fallback: If no build folder was created, copy the raw engine files
            cp -r ./* ${{ github.workspace }}/site_deployment/
          fi
          
          # 7. FINAL SEARCH & RESCUE: Force index.html to the absolute top
          find ${{ github.workspace }}/site_deployment -name "index.html" -exec cp {} ${{ github.workspace }}/site_deployment/ \;

      - name: 📂 Log Deployment (Final Verification)
        # This confirms main.js and the correct index.html are at the root
        run: ls -F ${{ github.workspace }}/site_deployment/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the folder containing ONLY the actual OpenFront engine
          path: ./site_deployment/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
