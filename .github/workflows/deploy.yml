name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Install, Build, and Restore HTML
        run: |
          # 1. Root Installation and Security Patching [1, 2]
          npm run inst
          npm audit fix --force || echo "Audit complete"
          
          # 2. ISOLATE THE ENGINE (src/client)
          # We enter the folder where the real game build scripts live [3]
          cd src/client
          npm install --legacy-peer-deps
          
          # 3. BUILD THE ACTUAL GAME [5]
          # Using --if-present ensures the build doesn't crash if names vary
          npm run build --if-present -- --base=/${{ github.event.repository.name }}/
          npm run compile --if-present -- --base=/${{ github.event.repository.name }}/
          
          # 4. CREATE THE SITE ROOT (404 Prevention)
          mkdir -p ${{ github.workspace }}/final_deployment
          
          # 5. MOVE THE GAME ASSETS [11, 20]
          # We take the finished files from the build folders
          if [ -d "dist" ]; then cp -r dist/* ${{ github.workspace }}/final_deployment/; fi
          if [ -d "build" ]; then cp -r build/* ${{ github.workspace }}/final_deployment/; fi
          
          # 6. RESTORE THE CORRECT HTML (The Fix)
          # We search ONLY inside src/client for the index.html. 
          # This avoids the "Playground" file in the root directory [5, 11]
          if [ ! -f "${{ github.workspace }}/final_deployment/index.html" ]; then
            find . -maxdepth 3 -name "index.html" -exec cp {} ${{ github.workspace }}/final_deployment/ \;
          fi

      - name: 📂 Log Deployment (404 & Engine Check)
        # This confirms index.html and main.js are present at the root
        run: ls -F ${{ github.workspace }}/final_deployment/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the folder where the real game index is now at the absolute top
          path: ./final_deployment/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
