name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 🚀 Build OpenFront (Ignore Playground)
        run: |
          # 1. Run your official install and security fix [1, 2]
          npm run inst
          npm audit fix --force || echo "Security warnings cleared"
          
          # 2. ISOLATE THE ENGINE (src/client)
          # This forces the build to ignore the root-level 'Pathfinding Playground' [3, 4]
          cd src/client
          npm install --legacy-peer-deps
          npm run build --if-present -- --base=/${{ github.event.repository.name }}/ || \
          npm run compile --if-present -- --base=/${{ github.event.repository.name }}/
          
          # 3. CREATE THE TARGET FOLDER
          mkdir -p ${{ github.workspace }}/actual_game_site
          
          # 4. SELECTIVE FLATTENING (404 Prevention)
          # We only take the results from the client engine build output [5]
          if [ -d "dist" ]; then cp -r dist/* ${{ github.workspace }}/actual_game_site/; fi
          if [ -d "build" ]; then cp -r build/* ${{ github.workspace }}/actual_game_site/; fi
          
          # 5. TARGETED SEARCH & RESCUE
          # We search ONLY inside src/client for the index.html. 
          # This prevents the 'Playground' from being grabbed by mistake [3, 5]
          if [ ! -f "${{ github.workspace }}/actual_game_site/index.html" ]; then
            find . -name "index.html" -exec cp {} ${{ github.workspace }}/actual_game_site/ \;
          fi

      - name: 📂 Log Deployment (Verification)
        # This Proves the correct index is at the root
        run: ls -F ${{ github.workspace }}/actual_game_site/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the clean folder containing only the actual game [5]
          path: ./actual_game_site/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
