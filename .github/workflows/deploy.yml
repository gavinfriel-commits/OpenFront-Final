name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Build OpenFront Engine (Playground Kill-Switch)
        run: |
          # 1. Install root tools and fix security [19, 20]
          npm run inst
          npm audit fix --force || echo "Audit warnings bypassed"
          
          # 2. KILL THE PLAYGROUND (Critical Fix)
          # We delete the test folders and root index.html so they cannot be deployed
          rm -rf tests/
          rm -f index.html
          
          # 3. BUILD THE ACTUAL ENGINE [1, 11]
          # We enter the client folder and force the production build
          cd src/client
          npm install --legacy-peer-deps
          npm run build -- --base=/${{ github.event.repository.name }}/
          
          # 4. CREATE CLEAN DEPLOYMENT ROOT
          mkdir -p ${{ github.workspace }}/site_root
          
          # 5. MOVE ONLY ENGINE FILES (404 Prevention) [11, 41]
          # We copy the compiled game from src/client/dist to the top level
          if [ -d "dist" ]; then 
            cp -r dist/* ${{ github.workspace }}/site_root/
          else
            echo "Build folder missing! Copying raw files as fallback..."
            cp -r ./* ${{ github.workspace }}/site_root/
          fi
          
          # Final Check: Move index.html to absolute root if it's trapped in subfolders
          find ${{ github.workspace }}/site_root -name "index.html" -exec cp {} ${{ github.workspace }}/site_root/ \;

      - name: 📂 Log Deployment (Verification)
        # This Proves the correct files are at the root
        run: ls -F ${{ github.workspace }}/site_root/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the clean folder containing ONLY the actual game [11]
          path: ./site_root/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
