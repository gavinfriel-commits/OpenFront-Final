name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Nuke Playground and Build Game
        run: |
          # 1. Root Security & Install [1, 2]
          npm run inst
          npm audit fix --force || echo "Security patched"
          
          # 2. THE NUKE: Delete root test files [3, 4]
          # This guarantees the Playground is hidden from the web
          rm -f index.html
          rm -rf tests/
          rm -rf pathfinding/
          
          # 3. BUILD THE ACTUAL ENGINE (src/client) [5, 11]
          cd src/client
          npm install --legacy-peer-deps
          npm run build --if-present -- --base=/${{ github.event.repository.name }}/
          
          # 4. CLEAN ROOM DEPLOYMENT (404 Prevention)
          # We create a folder that only receives the game files
          mkdir -p ${{ github.workspace }}/site_final
          
          # 5. RESTORE THE REAL HTML [11, 20]
          # Move compiled engine files to the front door
          if [ -d "dist" ]; then 
            cp -r dist/* ${{ github.workspace }}/site_final/
          elif [ -d "build" ]; then 
            cp -r build/* ${{ github.workspace }}/site_final/
          else
            # Fallback for uncompiled engine files
            cp -r ./* ${{ github.workspace }}/site_final/
          fi
          
          # 6. TARGETED RESCUE [5]
          # If index.html is missing from the root, we grab only the client version
          if [ ! -f "${{ github.workspace }}/site_final/index.html" ]; then
            find . -maxdepth 2 -name "index.html" -exec cp {} ${{ github.workspace }}/site_final/ \;
          fi

      - name: 📂 Log Deployment (Verification)
        # This Proves the Playground is gone and the Game is present
        run: ls -F ${{ github.workspace }}/site_final/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # Only the 'site_final' folder is uploaded to the internet
          path: ./site_final/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
