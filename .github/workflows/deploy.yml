name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build 🔧
        run: |
          # 1. Install official OpenFront dependencies at the root [12]
          npm run inst
          
          # 2. Move into the folder where the actual game lives [62]
          cd src/client
          
          # 3. Build the actual game and fix the subfolder path issue
          npm install --legacy-peer-deps
          npm run build -- --base=/${{ github.event.repository.name }}/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # CRITICAL: Pointing to the real game output, not the test folder
          path: src/client/dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
