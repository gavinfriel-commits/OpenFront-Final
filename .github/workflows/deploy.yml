name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Show Available Scripts
        # This step lets us see exactly what your package.json allows
        run: npm run

      - name: Install and Build 🔧
        run: |
          # Official OpenFront install command [4]
          npm run inst
          
          # Try the actual game compilation command
          # We add the --base flag to fix the "White Screen" issue [45]
          npm run compile -- --base=/${{ github.event.repository.name }}/ || npm run build -- --base=/${{ github.event.repository.name }}/ || echo "Build failed"
          
          # Ensure 'dist' folder exists
          mkdir -p dist
          if [ -d "build" ]; then cp -r build/* dist/; fi

      - name: 📂 Log Folder Contents
        run: ls -R dist/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
