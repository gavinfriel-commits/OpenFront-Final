name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Actual Game Engine 🔧
        run: |
          # 1. Install root dependencies
          npm run inst
          
          # 2. Enter the actual game client folder
          cd src/client
          npm install --legacy-peer-deps
          
          # 3. Build the game and set the correct URL path to fix white screens [1.4.6]
          npm run build -- --base=/${{ github.event.repository.name }}/
          
          # 4. FIX THE INDEX: Move compiled files to a root-level folder for GitHub
          mkdir -p ${{ github.workspace }}/site_root
          cp -r dist/* ${{ github.workspace }}/site_root/ || cp -r build/* ${{ github.workspace }}/site_root/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to the folder where index.html is now at the root
          path: ./site_root/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
