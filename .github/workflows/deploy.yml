name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Build 🔧
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          # Safety check: ensure the target folder actually exists
          ls -R ./tests/pathfinding/playground/public/
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # UPDATED: Pointing directly to your game's index.html location
          path: ./tests/pathfinding/playground/public/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
