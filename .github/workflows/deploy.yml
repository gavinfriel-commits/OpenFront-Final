name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build 🔧
        run: |
          # 1. Install dependencies using the official OpenFront command [4]
          npm run inst
          
          # 2. Go into the client folder where the game files actually live [57]
          # We try to build from the client folder first
          cd src/client || cd client || echo "Client folder not found"
          
          # 3. Build the game files
          # We use --if-present to prevent the "Missing script" error from stopping us
          npm install --legacy-peer-deps
          npm run build --if-present || npm run compile --if-present || echo "No build script found in client"
          
          # 4. Move the finished game to a folder GitHub can see
          mkdir -p ../../dist
          cp -r dist/* ../../dist/ || cp -r build/* ../../dist/ || cp index.html ../../dist/ || echo "Failed to find game files"

      - name: 📂 Log Folder Contents
        # This confirms we found the real game and not the 'Playground'
        run: ls -R dist/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
