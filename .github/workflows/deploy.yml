name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 🚀 Install, Fix, and Flatten OpenFront
        run: |
          # 1. Official OpenFront install and security fix [5]
          npm run inst
          npm audit fix --force || echo "Audit fix applied with warnings"
          
          # 2. Identify the Game Engine Directory (Ignoring Tests) [6]
          if [ -d "src/client" ]; then
            GAME_DIR="src/client"
          elif [ -d "client" ]; then
            GAME_DIR="client"
          else
            GAME_DIR="."
          fi
          
          # 3. Build the Game Engine
          # We enter the folder, install local tools, and compile [7]
          cd $GAME_DIR
          npm install --legacy-peer-deps
          npm run build --if-present -- --base=/${{ github.event.repository.name }}/
          
          # 4. SEARCH & RESCUE: Create a flat folder for the website root
          mkdir -p ${{ github.workspace }}/site_deployment
          
          # We look in every possible location for the finished game files
          # This 'flattens' the structure to kill the 404 error [8]
          cp -r dist/* ${{ github.workspace }}/site_deployment/ 2>/dev/null || \
          cp -r build/* ${{ github.workspace }}/site_deployment/ 2>/dev/null || \
          cp -r public/* ${{ github.workspace }}/site_deployment/ 2>/dev/null || echo "Standard folders not found"
          
          # Final Absolute Rescue: Find any index.html and move it to the top level
          find . -maxdepth 2 -name "index.html" -exec cp {} ${{ github.workspace }}/site_deployment/ \;

      - name: 📂 Log Deployment (404 Prevention Check)
        # This PROVES index.html is at the root so the site actually loads [9]
        run: ls -F ${{ github.workspace }}/site_deployment/
          
      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          # Pointing to the flat folder where index.html is at the top level
          path: ./site_deployment/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
